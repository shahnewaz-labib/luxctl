name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag version (e.g., v0.4.5)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      released: ${{ steps.check_release.outputs.exists == 'false' }}
    steps:
      - name: Validate tag format
        run: |
          if [[ ! "${{ inputs.tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format. Expected: v0.0.0"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0  # full history for git-cliff

      - name: Check if GitHub release exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release ${{ inputs.tag }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release ${{ inputs.tag }} does not exist"
          fi

      - name: Release already exists
        if: steps.check_release.outputs.exists == 'true'
        run: |
          echo "Release ${{ inputs.tag }} already exists. Done."
          exit 0

      - name: Setup Rust
        if: steps.check_release.outputs.exists == 'false'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: steps.check_release.outputs.exists == 'false'
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        if: steps.check_release.outputs.exists == 'false'
        run: cargo test

      - name: Verify version matches tag
        if: steps.check_release.outputs.exists == 'false'
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${{ inputs.tag }}"
          TAG_VERSION="${TAG_VERSION#v}"  # remove 'v' prefix

          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: Cargo.toml has $CARGO_VERSION, tag is $TAG_VERSION"
            exit 1
          fi
          echo "Version verified: $CARGO_VERSION"

      - name: Publish to crates.io
        if: steps.check_release.outputs.exists == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --dry-run
          cargo publish

      - name: Generate changelog
        if: steps.check_release.outputs.exists == 'false'
        run: |
          cargo install git-cliff --quiet
          # find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from $PREV_TAG to ${{ inputs.tag }}"
            git cliff "$PREV_TAG".."${{ inputs.tag }}" --output RELEASE_NOTES.md
          else
            echo "No previous tag found, generating full changelog"
            git cliff --output RELEASE_NOTES.md
          fi
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.tag }}" \
            --title "${{ inputs.tag }}" \
            --notes-file RELEASE_NOTES.md \
            --draft

      - name: Notify Slack
        if: steps.check_release.outputs.exists == 'false' && success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            VERSION="${{ inputs.tag }}"
            VERSION="${VERSION#v}"  # remove 'v' prefix

            MESSAGE=$(cat <<EOF
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🚀 luxctl ${{ inputs.tag }} released",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "A new version of luxctl has been published to crates.io.\n\n*Upgrade to the latest version:*"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "• *macOS/Linux:* \`cargo install luxctl --version $VERSION\`\n• *Windows:* \`cargo install luxctl --version $VERSION\`"
                }
              }
            ]
          }
          EOF
            )

            curl -X POST -H 'Content-type: application/json' \
              --data "$MESSAGE" \
              "$SLACK_WEBHOOK_URL"
          else
            echo "SLACK_WEBHOOK_URL not set, skipping notification"
          fi

      - name: Notify Slack on failure
        if: steps.check_release.outputs.exists == 'false' && failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"❌ luxctl ${{ inputs.tag }} release failed\"}" \
              "$SLACK_WEBHOOK_URL"
          fi

  build-binaries:
    needs: release
    if: needs.release.outputs.released == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: luxctl
            artifact_name: luxctl-linux-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: luxctl
            artifact_name: luxctl-linux-x86_64-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: luxctl
            artifact_name: luxctl-linux-aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary_name: luxctl
            artifact_name: luxctl-linux-aarch64-musl
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: luxctl
            artifact_name: luxctl-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: luxctl
            artifact_name: luxctl-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: luxctl.exe
            artifact_name: luxctl-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl)
              sudo apt-get install -y musl-tools
              ;;
            aarch64-unknown-linux-gnu)
              sudo apt-get install -y gcc-aarch64-linux-gnu
              ;;
            aarch64-unknown-linux-musl)
              sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
              ;;
          esac

      - name: Configure linker for cross-compilation
        if: startsWith(matrix.target, 'aarch64-unknown-linux')
        run: |
          mkdir -p .cargo
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            echo -e '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml
          elif [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            echo -e '[target.aarch64-unknown-linux-musl]\nlinker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml
          fi

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} ${{ matrix.artifact_name }}
          chmod +x ${{ matrix.artifact_name }}
          tar -czf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.artifact_name }}
          if command -v sha256sum &>/dev/null; then
            sha256sum ${{ matrix.artifact_name }}.tar.gz > ${{ matrix.artifact_name }}.tar.gz.sha256
          else
            shasum -a 256 ${{ matrix.artifact_name }}.tar.gz > ${{ matrix.artifact_name }}.tar.gz.sha256
          fi

      - name: Prepare binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} ${{ matrix.artifact_name }}
          7z a ${{ matrix.artifact_name }}.zip ${{ matrix.artifact_name }}
          sha256sum ${{ matrix.artifact_name }}.zip > ${{ matrix.artifact_name }}.zip.sha256

      - name: Upload binary to release (Unix)
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.tag }}" \
            ${{ matrix.artifact_name }}.tar.gz \
            ${{ matrix.artifact_name }}.tar.gz.sha256

      - name: Upload binary to release (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.tag }}" `
            ${{ matrix.artifact_name }}.zip `
            ${{ matrix.artifact_name }}.zip.sha256

  publish-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ inputs.tag }}" --draft=false --repo ${{ github.repository }}

  verify:
    needs: publish-release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Wait for crates.io index
        shell: bash
        run: sleep 30

      - name: Install luxctl from crates.io
        shell: bash
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"  # remove 'v' prefix
          cargo install luxctl --version "$VERSION"

      - name: Verify installed version
        shell: bash
        run: |
          EXPECTED_VERSION="${{ inputs.tag }}"
          EXPECTED_VERSION="${EXPECTED_VERSION#v}"  # remove 'v' prefix

          INSTALLED_VERSION=$(luxctl --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)

          echo "Expected: $EXPECTED_VERSION"
          echo "Installed: $INSTALLED_VERSION"

          if [ "$INSTALLED_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Version mismatch!"
            exit 1
          fi

          echo "✓ luxctl $INSTALLED_VERSION installed successfully on ${{ matrix.os }}"
